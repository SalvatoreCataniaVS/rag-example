# ===========================
# HTTP
# ===========================
quarkus.http.port=8080
quarkus.http.root-path=/api

# ===========================
# DATASOURCE - PostgreSQL (dev + prod)
# ===========================
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=user
%dev.quarkus.datasource.password=password
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/ragdb
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.jdbc.min-size=2

# ===========================
# HIBERNATE ORM
# ===========================
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.format-sql=true

%prod.quarkus.hibernate-orm.database.generation=validate
%prod.quarkus.hibernate-orm.log.sql=false

# ===========================
# SECURITY - Basic Auth (dev ? hardcoded users)
# ===========================
%dev.quarkus.http.auth.basic=true
%dev.quarkus.security.users.embedded.enabled=true
%dev.quarkus.security.users.embedded.plain-text=true

# User: admin / password: admin123 / role: admin
%dev.quarkus.security.users.embedded.users.admin=admin123
%dev.quarkus.security.users.embedded.roles.admin=admin

# User: user / password: user123 / role: user
%dev.quarkus.security.users.embedded.users.user=user123
%dev.quarkus.security.users.embedded.roles.user=user

# Prod: OAuth/OIDC (uncomment when ready)
# %prod.quarkus.oidc.auth-server-url=...
# %prod.quarkus.oidc.client-id=...

# ===========================
# MINIO
# ===========================
%dev.minio.url=http://localhost:9000
%dev.minio.access-key=minioadmin
%dev.minio.secret-key=minioadmin
%dev.minio.bucket=rag-documents

%prod.minio.url=${MINIO_URL:http://localhost:9000}
%prod.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
%prod.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
%prod.minio.bucket=${MINIO_BUCKET:rag-documents}

# ===========================
# KAFKA
# ===========================
%dev.kafka.bootstrap.servers=localhost:9092
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ===========================
# LOG
# ===========================
quarkus.log.level=INFO
%dev.quarkus.log.level=DEBUG
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n